# SilkCircuit Neon theme for lazygit
# Electric meets elegant
gui:
  # SilkCircuit Neon palette
  theme:
    activeBorderColor:
      - "#e135ff"  # neon purple
      - bold
    inactiveBorderColor:
      - "#637777"  # muted gray
    searchingActiveBorderColor:
      - "#80ffea"  # cyan
      - bold
    optionsTextColor:
      - "#80ffea"  # cyan
    selectedLineBgColor:
      - "#44475a"  # selection
    cherryPickedCommitBgColor:
      - "#3b2d4f"  # purple tint
    cherryPickedCommitFgColor:
      - "#e135ff"  # neon purple
    unstagedChangesColor:
      - "#ff6363"  # red
    defaultFgColor:
      - "#f8f8f2"  # foreground
    markedBaseCommitBgColor:
      - "#f1fa8c"  # yellow
    markedBaseCommitFgColor:
      - "#12101a"  # bg dark
  nerdFontsVersion: "3"
  showBottomLine: true
  showPanelJumps: true
  border: rounded
